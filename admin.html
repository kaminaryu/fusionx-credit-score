<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Admin Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body id="admin-page">
    <div class="container" style="max-width: 1000px;">
        <header>
            <h1>Bank Admin Portal</h1>
            <p>Decentralized Application Ledger</p>
            <a href="index.html" class="btn-secondary">← Back to Application Form</a>
        </header>

        <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px;">
            <div class="card text-center" style="padding: 15px;">
                <h3 style="margin: 0; color: var(--text-muted); font-size: 14px;">Total Applications</h3>
                <div id="kpiTotal" style="font-size: 32px; font-weight: 700; color: var(--text-main);">0</div>
            </div>
            <div class="card text-center" style="padding: 15px;">
                <h3 style="margin: 0; color: var(--text-muted); font-size: 14px;">Avg Credit Score</h3>
                <div id="kpiAvg" style="font-size: 32px; font-weight: 700; color: var(--primary);">0</div>
            </div>
            <div class="card text-center" style="padding: 15px;">
                <h3 style="margin: 0; color: var(--text-muted); font-size: 14px;">High Risk Alerts</h3>
                <div id="kpiRisk" style="font-size: 32px; font-weight: 700; color: #ef4444;">0</div>
            </div>
        </div>

        <div class="card" style="overflow-x: auto;">
    </div>
    <script src="/js/apps.js"></script>
</body>
</html>
