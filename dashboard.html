<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> </head>
    
<body id="dashboard-page">
    <div class="container">
        <header>
            <h1 id="dashboardTitle"></h1>
        </header>

        <div class="dashboard-grid">
            <div class="card" style="position: relative;">
                <h2>AI Credit Score</h2>
 
                <div style="max-width: 170px; margin: 0 auto; padding: 0px auto; line-height: 0;">
                    <canvas id="scoreChart"></canvas>
                </div>

                <div style="margin-top: 10px; display: flex; flex-direction: column; align-items: center;">
                    <div id="scoreDisplay" style="font-size: 56px; font-weight: 700; color: var(--text-main); line-height: 1;">--</div>
                    <div id="riskLevelText" style="font-size: 18px; font-weight: 600; margin-top: 8px;">-- Risk</div>
                </div>
            </div>

            <div class="card">
                <h2>Explainable AI Breakdown</h2>
 
                <div id="aiReasons" style="min-height: 160px;"></div>

                <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 20px;">
                    <button id="prevCard" onclick="changeCard(-1)" style="
                        background: none; background: #eee; border: 1px solid #e2e8f0; border-radius: 8px;
                        padding: 8px 16px; cursor: pointer; font-size: 18px; color: var(--text-main);
                        transition: background 0.2s;
                    ">←</button>

                    <span id="cardCounter" style="font-size: 15px; color: var(--text-muted);"></span>

                    <button id="nextCard" onclick="changeCard(1)" style="
                        background: none; background: #eee; border: 1px solid #e2e8f0; border-radius: 8px;
                        padding: 8px 16px; cursor: pointer; font-size: 18px; color: var(--text-main);
                        transition: background 0.2s;
                    ">→</button>
                </div>
            </div>
        </div>

        <div class="card" style="background-color: #f8fafc; border: 1px solid #e2e8f0;">
            <h3 style="margin-top: 0; margin-bottom: 15px; display: flex; align-items: center;">
                🔗 Smart Contract Receipt
                <span style="margin-left: auto; background: #10b981; color: white; font-size: 12px; padding: 3px 8px; border-radius: 12px;">Verified</span>
            </h3>
            
            <div style="font-family: monospace; font-size: 13px; color: var(--text-main); line-height: 1.8;">
                <div><strong style="color: var(--text-muted);">Network:</strong> Ethereum (Sepolia Testnet)</div>
                <div><strong style="color: var(--text-muted);">Applicant Wallet:</strong> <span id="ledgerWallet" style="color: var(--primary);">--</span></div>
                <div><strong style="color: var(--text-muted);">Block Number:</strong> <span id="ledgerBlock">--</span></div>
                <div><strong style="color: var(--text-muted);">Timestamp:</strong> <span id="ledgerTime">--</span></div>
                <div><strong style="color: var(--text-muted);">Gas Fee Used:</strong> <span id="ledgerGas">--</span> ETH</div>
                
                <div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #cbd5e1;">
                    <strong style="color: var(--text-muted); display: block; margin-bottom: 5px;">SHA-256 Transaction Hash:</strong>
                    <div id="ledgerHash" style="background: #e2e8f0; padding: 8px; border-radius: 4px; word-break: break-all; font-size: 12px;">
                        --
                    </div>
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end">
            <a href="index.html" class="btn-secondary">← Back to New Application</a>
        </div>
    </div>
    <script src="/js/dashboard.js"></script>
</body>
</html>
